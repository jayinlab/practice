name: Build and Release APK

on:
  push:
    branches: [ "claude/android-ime-esc-english-8FaFG", "master", "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK (debug-signed)
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/KoreanIME-debug.apk
          cp app/build/outputs/apk/release/app-release.apk artifacts/KoreanIME-release.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: artifacts/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name != '' && startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: Korean IME ${{ github.ref_name != '' && startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest build' }}
          body: |
            ## Korean IME for Android (Galaxy Tab S8 Ultra)

            ### 설치 방법
            ```bash
            adb install KoreanIME-debug.apk
            ```
            그 다음 설정 → 일반 관리 → 언어 및 입력 → 화면 키보드 → Korean IME 활성화 후 기본 키보드로 설정

            ### 기능
            - 두벌식 한글 입력 (자모 조합)
            - `ESC`: 한글 모드이면 영어로 전환 후 ESC 전달
            - `CapsLock` 단타: 한/영 전환
            - `CapsLock` 장타(250ms+): 영어로 전환 + ESC
            - `Ctrl+J/L/T/R/Y/U/O`: 한글이면 영어 전환 후 단축키 전달
            - `Shift+' / Shift+] / Shift+G`: 한글이면 영어 전환 후 키 전달
            - `Shift+J` → Down, `Shift+K` → Up

            ### 파일
            - `KoreanIME-debug.apk` — 바로 설치 가능 (디버그 서명)
            - `KoreanIME-release.apk` — 릴리즈 빌드 (디버그 서명)
          files: artifacts/*.apk
          draft: false
          prerelease: false
