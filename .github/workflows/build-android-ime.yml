name: Build and Release APK

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    # Pin to ubuntu-22.04: well-documented Android SDK pre-install
    # (Android 34, build-tools 34.0.0 confirmed available)
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # setup-java with cache:gradle handles both JDK and Gradle dependency caching
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Accept all Android SDK licenses.
      # ubuntu-22.04 has sdkmanager on PATH via $ANDROID_HOME/cmdline-tools/latest/bin
      # ANDROID_HOME = /usr/local/lib/android/sdk on GitHub-hosted runners
      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses 2>&1 | grep -v "^-\+$" || true

      # Build both variants in one Gradle invocation (faster)
      - name: Build debug + release APKs
        run: ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace
        working-directory: android-ime

      # Collect artifacts; handle both signed (app-release.apk) and
      # unsigned (app-release-unsigned.apk) naming
      - name: Collect APKs
        run: |
          mkdir -p artifacts
          cp android-ime/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/KoreanIME-debug.apk
          RELEASE_APK=$(find android-ime/app/build/outputs/apk/release/ \
            -name "*.apk" -maxdepth 1 | head -1)
          if [ -z "$RELEASE_APK" ]; then
            echo "ERROR: release APK not found"
            find android-ime/app/build/outputs/ -name "*.apk"
            exit 1
          fi
          cp "$RELEASE_APK" artifacts/KoreanIME-release.apk
          echo "Collected APKs:"
          ls -lh artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: artifacts/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: Korean IME ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          generate_release_notes: true
          body: |
            ## Korean IME for Android (Galaxy Tab S8 Ultra)

            ### 설치
            ```bash
            adb install KoreanIME-release.apk
            ```
            설정 → 일반 관리 → 언어 및 입력 → 화면 키보드 → Korean IME 활성화 후 기본으로 설정

            ### 주요 기능
            - 두벌식 한글 입력 (자모 조합, 겹모음/겹받침 지원)
            - `ESC`: 한글 → 영어 전환 후 ESC 전달
            - `CapsLock` 단타: 한/영 전환
            - `CapsLock` 장타 (250ms+): 영어 전환 + ESC
            - `Right Alt`: 한/영 전환 (한글 키보드 한/영 키)
            - 좌/우 Shift + 한글키로 쌍자음 (ㅃ/ㅉ/ㄸ/ㄲ/ㅆ)
            - `Ctrl+J/L/T/R/Y/U/O`: 영어 전환 후 단축키 전달
            - `Shift+' / ] / G`: 영어 전환 후 키 전달
            - `Shift+J` → Down, `Shift+K` → Up
            - `Shift+Tab` → 내어쓰기 (dedent)

            ### 파일
            - `KoreanIME-release.apk` — **권장** (R8 최적화, 빠름)
            - `KoreanIME-debug.apk` — 대안

            ---
          files: artifacts/*.apk
          draft: false
          prerelease: false
